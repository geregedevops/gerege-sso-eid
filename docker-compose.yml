services:
  # === Infrastructure ===
  postgres:
    image: postgres:15-alpine
    container_name: gerege-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-dan-db.sh:/docker-entrypoint-initdb.d/00-init-dan-db.sh:ro
      - ./verify.gerege.mn/init-verify-db.sh:/docker-entrypoint-initdb.d/01-init-verify-db.sh:ro
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gerege

  redis:
    image: redis:7-alpine
    container_name: gerege-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gerege

  # === SSO Server (Go) ===
  sso:
    build:
      context: ./sso.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-sso
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SSO_ISSUER: https://sso.gerege.mn
      SSO_PRIVATE_KEY_PATH: /etc/gerege/sso/ec-private.pem
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      EID_BASE_URL: https://dapi.gerege.mn
      OCSP_URL: ""
      CA_ISSUING_URL: ""
      PORT: 8443
    volumes:
      - ./keys:/etc/gerege/sso:ro
    networks:
      - gerege

  # === DAN API Gateway (Go) ===
  dan-api:
    build:
      context: ./dan.gerege.mn/api
      dockerfile: Dockerfile
    container_name: gerege-dan-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DAN_CLIENT_ID: ${DAN_CLIENT_ID}
      DAN_CLIENT_SECRET: ${DAN_CLIENT_SECRET}
      DAN_SCOPE: ${DAN_SCOPE}
      DAN_CALLBACK_URI: ${DAN_CALLBACK_URI}
      DAN_TOKEN_URL: ${DAN_TOKEN_URL}
      DAN_SERVICE_URL: ${DAN_SERVICE_URL}
      DAN_STATE_SECRET: ${DAN_STATE_SECRET}
      DAN_ADMIN_KEY: ${DAN_ADMIN_KEY}
      DAN_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gerege_dan_db
      CORS_ORIGIN: https://dan.gerege.mn
      PORT: 8444
    networks:
      - gerege

  # === DAN Web Dashboard (Next.js) ===
  dan-web:
    build:
      context: ./dan.gerege.mn/web
      dockerfile: Dockerfile
    container_name: gerege-dan-web
    restart: unless-stopped
    depends_on:
      dan-api:
        condition: service_started
    environment:
      DAN_API_URL: http://dan-api:8444
      DAN_ADMIN_KEY: ${DAN_ADMIN_KEY}
    networks:
      - gerege

  # === API Server (Go) ===
  api:
    build:
      context: ./api.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SSO_JWKS_URI: https://sso.gerege.mn/.well-known/jwks.json
      EID_API_URL: https://dapi.gerege.mn
      STORAGE_PATH: /var/api/signed-docs
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      PORT: 8080
    volumes:
      - signed_docs:/var/api/signed-docs
    networks:
      - gerege

  # === Developer Portal (Next.js) ===
  developer:
    build:
      context: ./developer.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-developer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_APP_URL: https://developer.gerege.mn
      NEXT_PUBLIC_SSO_URL: https://sso.gerege.mn
      NEXTAUTH_URL: https://developer.gerege.mn
      NEXTAUTH_SECRET: ${DEV_NEXTAUTH_SECRET}
      EID_CLIENT_ID: ${DEV_EID_CLIENT_ID}
      EID_CLIENT_SECRET: ${DEV_EID_CLIENT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - gerege

  # === Test Sandbox (Next.js) ===
  test:
    build:
      context: ./test.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-test
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: https://test.gerege.mn
      NEXT_PUBLIC_SSO_URL: https://sso.gerege.mn
      NEXT_PUBLIC_SANDBOX_URL: https://sandbox.gerege.mn
      NEXTAUTH_URL: https://test.gerege.mn
      NEXTAUTH_SECRET: ${TEST_NEXTAUTH_SECRET}
      EID_CLIENT_ID: ${TEST_EID_CLIENT_ID}
      EID_CLIENT_SECRET: ${TEST_EID_CLIENT_SECRET}
      DAN_URL: http://dan-api:8444
      DAN_CLIENT_ID: ${TEST_DAN_CLIENT_ID}
    networks:
      - gerege

  # === d-business.mn (Next.js) ===
  dbusiness:
    build:
      context: ./d-business.mn
      dockerfile: Dockerfile
    container_name: gerege-dbusiness
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_APP_URL: https://d-business.mn
      NEXT_PUBLIC_SSO_URL: https://sso.gerege.mn
      NEXTAUTH_URL: https://d-business.mn
      NEXTAUTH_SECRET: ${DBIZ_NEXTAUTH_SECRET}
      GEREGE_SSO_CLIENT: ${DBIZ_GEREGE_SSO_CLIENT}
      GEREGE_SSO_SECRET: ${DBIZ_GEREGE_SSO_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_URL: http://api:8080
    networks:
      - gerege

  # === Docs Wiki (Next.js) ===
  docs:
    build:
      context: ./docs.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-docs
    restart: unless-stopped
    networks:
      - gerege

  # === G-Sign Gateway (Go) ===
  gsign:
    build:
      context: ./gsign.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-gsign
    restart: unless-stopped
    environment:
      PORT: 8445
      ESIGN_TOKEN: ${ESIGN_TOKEN}
      MSSP_URL: ${MSSP_URL}
      APP_URL: https://gsign.gerege.mn
    networks:
      - gerege

  # === Verify API (Go) ===
  verify-api:
    build:
      context: ./verify.gerege.mn/api
      dockerfile: Dockerfile
    container_name: gerege-verify-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8446
      VERIFY_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gerege_verify_db?sslmode=disable
      VERIFY_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
      VERIFY_ADMIN_KEY: ${VERIFY_ADMIN_KEY}
      UPSTREAM_API_URL: ${UPSTREAM_API_URL}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY}
      VERIFY_CORS_ORIGIN: https://verify.gerege.mn
    networks:
      - gerege

  # === Verify Admin Dashboard (Next.js) ===
  verify-web:
    build:
      context: ./verify.gerege.mn/web
      dockerfile: Dockerfile
    container_name: gerege-verify-web
    restart: unless-stopped
    depends_on:
      verify-api:
        condition: service_started
    environment:
      VERIFY_API_URL: http://verify-api:8446
      VERIFY_WEB_ADMIN_KEY: ${VERIFY_ADMIN_KEY}
      UPSTREAM_API_URL: ${UPSTREAM_API_URL}
    networks:
      - gerege

  # === Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: gerege-nginx
    restart: unless-stopped
    depends_on:
      - sso
      - api
      - developer
      - test
      - dan-api
      - dan-web
      - gsign
      - docs
      - dbusiness
      - verify-api
      - verify-web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - gerege

  # === Certbot ===
  certbot:
    image: certbot/certbot
    container_name: gerege-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - gerege

volumes:
  pgdata:
  signed_docs:
  certbot_www:
  certbot_certs:

networks:
  gerege:
    driver: bridge
