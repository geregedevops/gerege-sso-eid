services:
  # === Infrastructure ===
  postgres:
    image: postgres:15-alpine
    container_name: gerege-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sso
      POSTGRES_PASSWORD: gerege_sso_pass_2026
      POSTGRES_DB: gerege_sso_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso -d gerege_sso_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gerege

  redis:
    image: redis:7-alpine
    container_name: gerege-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gerege

  # === SSO Server (Go) ===
  sso:
    build:
      context: ./sso.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-sso
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SSO_ISSUER: https://sso.gerege.mn
      SSO_PRIVATE_KEY_PATH: /etc/gerege/sso/ec-private.pem
      DATABASE_URL: postgres://sso:gerege_sso_pass_2026@postgres:5432/gerege_sso_db
      REDIS_URL: redis://redis:6379/2
      EID_BASE_URL: https://e-id.mn
      OCSP_URL: ""
      CA_ISSUING_URL: ""
      DAN_CLIENT_ID: f3f14ab1af2cf74fd7ade8a0-964f9d4992277df04d43aef0c80a1152
      DAN_SCOPE: W3sic2VydmljZXMiOlsiV1MxMDAxMDFfZ2V0Q2l0aXplbklEQ2FyZEluZm8iXSwid3NkbCI6Imh0dHBzOlwvXC94eXAuZ292Lm1uXC9jaXRpemVuLTEuMy4wXC93cz9XU0RMIn1d
      DAN_CALLBACK_URI: https://dan.gerege.mn/authorized
      DAN_GATEWAY_CLIENT: sso
      DAN_GATEWAY_SECRET: 166ac3b9b4c74f345b7f0ca5529f1c30c58524e4e96bf619cac1f3d4892a9807
      PORT: 8443
      DEV_MODE: "true"
    volumes:
      - ./keys:/etc/gerege/sso:ro
    ports:
      - "127.0.0.1:8443:8443"
    networks:
      - gerege

  # === API Server (Go) ===
  api:
    build:
      context: ./api.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SSO_JWKS_URI: https://sso.gerege.mn/.well-known/jwks.json
      EID_API_URL: https://api.e-id.mn
      STORAGE_PATH: /var/api/signed-docs
      DATABASE_URL: postgres://sso:gerege_sso_pass_2026@postgres:5432/gerege_sso_db
      REDIS_URL: redis://redis:6379/3
      PORT: 8080
    volumes:
      - signed_docs:/var/api/signed-docs
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - gerege

  # === Developer Portal (Next.js) ===
  developer:
    build:
      context: ./developer.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-developer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_APP_URL: https://developer.gerege.mn
      NEXT_PUBLIC_SSO_URL: https://sso.gerege.mn
      NEXTAUTH_URL: https://developer.gerege.mn
      NEXTAUTH_SECRET: gerege-dev-portal-secret-change-me-2026
      EID_CLIENT_ID: gerege-developer-portal
      EID_CLIENT_SECRET: gerege-sso-secret-2026
      DATABASE_URL: postgres://sso:gerege_sso_pass_2026@postgres:5432/gerege_sso_db
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - gerege

  # === Test Sandbox (Next.js) ===
  test:
    build:
      context: ./test.gerege.mn
      dockerfile: Dockerfile
    container_name: gerege-test
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: https://test.gerege.mn
      NEXT_PUBLIC_SSO_URL: https://sso.gerege.mn
      NEXT_PUBLIC_SANDBOX_URL: https://sandbox.gerege.mn
      NEXTAUTH_URL: https://test.gerege.mn
      NEXTAUTH_SECRET: gerege-test-sandbox-secret-change-me-2026
      EID_CLIENT_ID: cmnokjo8p0004v0ctdmssbr82
      EID_CLIENT_SECRET: IbwsUqtOtCoxpdlFvLulHbVVlFgHlSLOYUeS7avvnjk
    ports:
      - "127.0.0.1:3003:3000"
    networks:
      - gerege

  # === Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: gerege-nginx
    restart: unless-stopped
    depends_on:
      - sso
      - api
      - developer
      - test
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - gerege

  # === Certbot ===
  certbot:
    image: certbot/certbot
    container_name: gerege-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - gerege

volumes:
  pgdata:
  signed_docs:
  certbot_www:
  certbot_certs:

networks:
  gerege:
    driver: bridge
