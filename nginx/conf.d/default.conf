# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name sso.gerege.mn developer.gerege.mn test.gerege.mn api.gerege.mn gsign.gerege.mn dan.gerege.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# sso.gerege.mn — OIDC Authorization Server
server {
    listen 443 ssl http2;
    server_name sso.gerege.mn;

    ssl_certificate     /etc/letsencrypt/live/sso.gerege.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sso.gerege.mn/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://sso:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

