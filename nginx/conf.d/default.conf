# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name sso.gerege.mn developer.gerege.mn test.gerege.mn api.gerege.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# dan.gerege.mn — DAN gateway
server {
    listen 80;
    server_name dan.gerege.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://sso:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name dan.gerege.mn;

    ssl_certificate     /etc/letsencrypt/live/sso.gerege.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sso.gerege.mn/privkey.pem;

    location / {
        proxy_pass http://sso:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

