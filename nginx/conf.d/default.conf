    listen 443 ssl http2;
    server_name verify.gerege.mn;

    ssl_certificate     /etc/letsencrypt/live/sso.gerege.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sso.gerege.mn/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Verification API endpoints → Go backend
    location /v1/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://verify-api:8446;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin API → Go backend
    location /api/clients {
        limit_req zone=auth burst=20 nodelay;
