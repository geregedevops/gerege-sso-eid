# Phase 1: HTTP only (for certbot ACME challenge)
server {
    listen 80;
    server_name sso.gerege.mn developer.gerege.mn test.gerege.mn api.gerege.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to services (HTTP mode until SSL certs are ready)
    location / {
        # Will be replaced with HTTPS redirect after certs are obtained
        set $upstream "";

        if ($host = "sso.gerege.mn") {
            set $upstream "http://sso:8443";
        }
        if ($host = "developer.gerege.mn") {
            set $upstream "http://developer:3000";
        }
        if ($host = "test.gerege.mn") {
            set $upstream "http://test:3000";
        }
        if ($host = "api.gerege.mn") {
            set $upstream "http://api:8080";
        }

        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
