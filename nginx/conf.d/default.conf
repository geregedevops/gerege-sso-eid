# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name sso.gerege.mn developer.gerege.mn test.gerege.mn api.gerege.mn gsign.gerege.mn dan.gerege.mn docs.gerege.mn d-business.mn verify.gerege.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# sso.gerege.mn — OIDC Authorization Server
server {
    listen 443 ssl http2;
    server_name sso.gerege.mn;

    ssl_certificate     /etc/letsencrypt/live/sso.gerege.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sso.gerege.mn/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://sso:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# dan.gerege.mn — DAN Gateway (Go API + Next.js Web)
server {
    listen 443 ssl http2;
    server_name dan.gerege.mn;

    ssl_certificate     /etc/letsencrypt/live/sso.gerege.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sso.gerege.mn/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # DAN gateway endpoints → Go backend
    location /verify {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://dan-api:8444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /authorized {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://dan-api:8444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /try {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://dan-api:8444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://dan-api:8444;
        proxy_set_header Host $host;
    }

    # Next.js admin dashboard (dan-web)
    location /admin {
        proxy_pass http://dan-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth {
        proxy_pass http://dan-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth {
        proxy_pass http://dan-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next {
        proxy_pass http://dan-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Go backend (serves index page + fallback)
    location / {
        proxy_pass http://dan-api:8444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

